<!doctype html>
<html lang="en" class="h-full">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MLOps Audit Agent - Register</title>

<script src="https://cdn.tailwindcss.com/3.4.17"></script>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
*{font-family:'Space Grotesk',sans-serif;}

.gradient-bg{
background:linear-gradient(-45deg,#0a1f2e,#0d3a4f,#1a2f4a,#0f4c5c);
background-size:400% 400%;
animation:gradientShift 12s ease infinite;
}

@keyframes gradientShift{
0%,100%{background-position:0% 50%}
50%{background-position:100% 50%}
}

@keyframes float{
0%,100%{transform:translateY(0px)}
50%{transform:translateY(-20px)}
}

.glass{
background:rgba(15,15,35,0.8);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.1);
}

.form-input{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
}

.form-input:focus{
border-color:#6366f1;
outline:none;
}

.btn-primary{
background:linear-gradient(to right,#6366f1,#9333ea);
}
</style>
</head>

<body class="h-full gradient-bg text-white overflow-hidden">

<div class="absolute inset-0 flex items-center justify-center z-0">

<!-- Animated pipeline background -->
<div class="flex flex-row items-center justify-center gap-10 opacity-30">

<div class="flex flex-col items-center animate-float">
<div class="w-32 h-32 rounded-2xl bg-gradient-to-br from-blue-500 to-blue-700 flex items-center justify-center shadow-2xl">
<svg class="w-16 h-16" fill="none" stroke="white" viewBox="0 0 24 24">
<path stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.9A5 5 0 1116 6a5 5 0 011 9.9"/>
</svg>
</div>
<span class="mt-3 text-sm text-gray-300">Upload</span>
</div>

<div class="w-24 h-2 bg-gradient-to-r from-blue-500 to-purple-500 rounded-full"></div>

<div class="flex flex-col items-center animate-float">
<div class="w-32 h-32 rounded-2xl bg-gradient-to-br from-purple-500 to-indigo-700 flex items-center justify-center shadow-2xl">
<svg class="w-16 h-16" fill="none" stroke="white" viewBox="0 0 24 24">
<path stroke-width="1.5" d="M9 12h6m-3-3v6"/>
</svg>
</div>
<span class="mt-3 text-sm text-gray-300">Analyze</span>
</div>

<div class="w-24 h-2 bg-gradient-to-r from-purple-500 to-pink-500 rounded-full"></div>

<div class="flex flex-col items-center animate-float">
<div class="w-32 h-32 rounded-2xl bg-gradient-to-br from-pink-500 to-red-600 flex items-center justify-center shadow-2xl">
<svg class="w-16 h-16" fill="none" stroke="white" viewBox="0 0 24 24">
<path stroke-width="1.5" d="M5 13l4 4L19 7"/>
</svg>
</div>
<span class="mt-3 text-sm text-gray-300">Report</span>
</div>

</div>
</div>

<!-- Register Form -->
<div class="absolute inset-0 flex items-center justify-center z-10">

<div class="glass p-10 rounded-3xl w-[420px] shadow-2xl">

<h2 class="text-3xl font-bold text-center mb-6">Create Account</h2>

<form class="space-y-4">

<input type="text" placeholder="Full Name"
class="form-input w-full px-4 py-3 rounded-xl">

<input type="email" placeholder="Email"
class="form-input w-full px-4 py-3 rounded-xl">

<input type="password" placeholder="Password"
class="form-input w-full px-4 py-3 rounded-xl">

<input type="password" placeholder="Confirm Password"
class="form-input w-full px-4 py-3 rounded-xl">

<button class="btn-primary w-full py-3 rounded-xl font-semibold mt-4">
Register
</button>

</form>

<p class="text-center mt-6 text-gray-400">
Already have an account?
<a href="login.html" class="text-indigo-400">Login</a>
</p>

</div>

</div>

</body>
</html>
