<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Model & Dataset Ingestion</title>
    <style>
        :root {
            --primary-color: #00f2ff;
            --secondary-color: #bd00ff;
            --bg-color: #050510;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-color: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden; /* Prevent scrollbars from canvas */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.5s ease;
        }

        /* The Neural Network Canvas */
        #neural-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* Main Container */
        .container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 800px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            text-align: center;
            margin-bottom: 30px;
            color: #aaa;
            font-size: 0.9rem;
        }

        /* Upload Sections */
        .upload-section {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .drop-zone {
            flex: 1;
            border: 2px dashed var(--glass-border);
            border-radius: 12px;
            padding: 30px 20px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            background: rgba(0,0,0,0.2);
        }

        .drop-zone:hover, .drop-zone.dragover {
            border-color: var(--primary-color);
            background: rgba(0, 242, 255, 0.05);
            transform: scale(1.02);
        }

        .drop-zone h3 {
            font-size: 1.1rem;
            margin-bottom: 10px;
        }

        .drop-zone p {
            font-size: 0.8rem;
            color: #888;
        }

        .icon {
            font-size: 2rem;
            margin-bottom: 10px;
            display: block;
        }

        /* Hidden Input */
        input[type="file"] {
            display: none;
        }

        /* File Info Display */
        .file-info {
            margin-top: 10px;
            font-size: 0.85rem;
            color: var(--primary-color);
            display: none;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        /* Action Button */
        .btn-process {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .btn-process:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(189, 0, 255, 0.4);
        }

        .btn-process:active {
            transform: translateY(0);
        }

        /* Loading Bar */
        .progress-container {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.1);
            margin-top: 20px;
            border-radius: 2px;
            overflow: hidden;
            display: none;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: var(--primary-color);
            transition: width 0.1s linear;
            box-shadow: 0 0 10px var(--primary-color);
        }

        /* Status Message */
        .status-msg {
            text-align: center;
            margin-top: 15px;
            font-size: 0.9rem;
            min-height: 20px;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .upload-section {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <!-- Background Animation -->
    <canvas id="neural-canvas"></canvas>

    <!-- Main Interface -->
    <div class="container">
        <h1>Neural Ingestion</h1>
        <p class="subtitle">Upload Trained Weights & Training Data</p>

        <div class="upload-section">
            <!-- Model Upload -->
            <div class="drop-zone" id="model-zone" onclick="document.getElementById('model-input').click()">
                <span class="icon">🧠</span>
                <h3>AI Model</h3>
                <p>Drag .pth, .h5, .onnx, or .bin</p>
                <input type="file" id="model-input" accept=".pth,.h5,.onnx,.bin,.safetensors">
                <div class="file-info" id="model-info"></div>
            </div>

            <!-- Dataset Upload -->
            <div class="drop-zone" id="dataset-zone" onclick="document.getElementById('dataset-input').click()">
                <span class="icon">📊</span>
                <h3>Dataset</h3>
                <p>Drag .csv, .json, .parquet, or .zip</p>
                <input type="file" id="dataset-input" accept=".csv,.json,.parquet,.zip,.tar">
                <div class="file-info" id="dataset-info"></div>
            </div>
        </div>

        <button class="btn-process" onclick="processUpload()">Initialize Pipeline</button>

        <div class="progress-container" id="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>

        <div class="status-msg" id="status-msg"></div>
    </div>

    <script>
        // --- 1. Color Changing Background Logic ---
        let hue = 0;
        function changeColor() {
            hue = (hue + 0.5) % 360;
            // Create a deep, dark background that shifts color
            document.body.style.setProperty('--bg-color', `hsl(${hue}, 40%, 5%)`);
            requestAnimationFrame(changeColor);
        }
        changeColor();

        // --- 2. Neural Network Canvas Animation ---
        const canvas = document.getElementById('neural-canvas');
        const ctx = canvas.getContext('2d');
        let particlesArray;

        // Resize canvas
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            init();
        });

        // Mouse interaction
        const mouse = { x: null, y: null, radius: 150 };
        window.addEventListener('mousemove', (event) => {
            mouse.x = event.x;
            mouse.y = event.y;
        });

        class Particle {
            constructor(x, y, directionX, directionY, size, color) {
                this.x = x;
                this.y = y;
                this.directionX = directionX;
                this.directionY = directionY;
                this.size = size;
                this.color = color;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
                ctx.fillStyle = '#00f2ff'; // Node color
                ctx.fill();
            }
            update() {
                if (this.x > canvas.width || this.x < 0) this.directionX = -this.directionX;
                if (this.y > canvas.height || this.y < 0) this.directionY = -this.directionY;

                // Mouse interaction (repel/attraction)
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx*dx + dy*dy);
                if (distance < mouse.radius + this.size) {
                    if (mouse.x < this.x && this.x < canvas.width - this.size * 10) this.x += 2;
                    if (mouse.x > this.x && this.x > this.size * 10) this.x -= 2;
                    if (mouse.y < this.y && this.y < canvas.height - this.size * 10) this.y += 2;
                    if (mouse.y > this.y && this.y > this.size * 10) this.y -= 2;
                }

                this.x += this.directionX;
                this.y += this.directionY;
                this.draw();
            }
        }

        function init() {
            particlesArray = [];
            let numberOfParticles = (canvas.height * canvas.width) / 9000;
            for (let i = 0; i < numberOfParticles; i++) {
                let size = (Math.random() * 2) + 1;
                let x = (Math.random() * ((innerWidth - size * 2) - (size * 2)) + size * 2);
                let y = (Math.random() * ((innerHeight - size * 2) - (size * 2)) + size * 2);
                let directionX = (Math.random() * 1) - 0.5;
                let directionY = (Math.random() * 1) - 0.5;
                let color = '#00f2ff';
                particlesArray.push(new Particle(x, y, directionX, directionY, size, color));
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            ctx.clearRect(0, 0, innerWidth, innerHeight);
            
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
            }
            connect();
        }

        function connect() {
            let opacityValue = 1;
            for (let a = 0; a < particlesArray.length; a++) {
                for (let b = a; b < particlesArray.length; b++) {
                    let distance = ((particlesArray[a].x - particlesArray[b].x) * (particlesArray[a].x - particlesArray[b].x)) + 
                                   ((particlesArray[a].y - particlesArray[b].y) * (particlesArray[a].y - particlesArray[b].y));
                    
                    if (distance < (canvas.width/7) * (canvas.height/7)) {
                        opacityValue = 1 - (distance/20000);
                        ctx.strokeStyle = 'rgba(0, 242, 255,' + opacityValue + ')';
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                        ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        init();
        animate();

        // --- 3. File Upload Logic ---
        const modelZone = document.getElementById('model-zone');
        const datasetZone = document.getElementById('dataset-zone');
        const modelInput = document.getElementById('model-input');
        const datasetInput = document.getElementById('dataset-input');
        const modelInfo = document.getElementById('model-info');
        const datasetInfo = document.getElementById('dataset-info');
        const statusMsg = document.getElementById('status-msg');
        const progressBar = document.getElementById('progress-bar');
        const progressContainer = document.getElementById('progress-container');

        // Helper to handle file selection
        function handleFileSelect(input, zone, infoDiv) {
            input.addEventListener('change', (e) => {
                if (e.target.files.length > 0) {
                    const file = e.target.files[0];
                    infoDiv.style.display = 'flex';
                    infoDiv.innerHTML = `✅ ${file.name} (${(file.size/1024/1024).toFixed(2)} MB)`;
                    zone.style.borderColor = '#00ff88';
                }
            });
        }

        handleFileSelect(modelInput, modelZone, modelInfo);
        handleFileSelect(datasetInput, datasetZone, datasetInfo);

        // Drag and Drop Visuals
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            modelZone.addEventListener(eventName, preventDefaults, false);
            datasetZone.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            modelZone.addEventListener(eventName, () => modelZone.classList.add('dragover'), false);
            datasetZone.addEventListener(eventName, () => datasetZone.classList.add('dragover'), false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            modelZone.addEventListener(eventName, () => modelZone.classList.remove('dragover'), false);
            datasetZone.addEventListener(eventName, () => datasetZone.classList.remove('dragover'), false);
        });

        // --- 4. Simulation Logic ---
        function processUpload() {
            const modelFile = modelInput.files[0];
            const datasetFile = datasetInput.files[0];

            if (!modelFile || !datasetFile) {
                statusMsg.style.color = '#ff4444';
                statusMsg.innerText = "Error: Please upload both a Model and a Dataset.";
                return;
            }

            statusMsg.style.color = '#00f2ff';
            statusMsg.innerText = "Initializing Pipeline...";
            progressContainer.style.display = 'block';
            
            let width = 0;
            const interval = setInterval(() => {
                if (width >= 100) {
                    clearInterval(interval);
                    statusMsg.style.color = '#00ff88';
                    statusMsg.innerText = "Pipeline Complete. Model Ready for Inference.";
                } else {
                    width++;
                    progressBar.style.width = width + '%';
                }
            }, 30); // Speed of simulation
        }
    </script>
</body>
</html>
